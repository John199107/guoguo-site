<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>果果的梦幻小城堡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== Reset & Base ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pink-light: #f9e7ff;
            --pink-mid: #ffd6e8;
            --pink-deep: #f8b8d8;
            --lavender: #e0c8f0;
            --purple: #6b3f7a;
            --purple-light: #9b6aaa;
            --gold: #ffe99c;
            --gold-solid: #ffd966;
            --cream: #fff8f5;
            --white-glass: rgba(255, 248, 255, 0.72);
        }

        body {
            font-family: 'ZCOOL KuaiLe', 'Nunito', 'PingFang SC', cursive, sans-serif;
            background: linear-gradient(145deg, var(--pink-light) 0%, #f3d4ff 40%, var(--pink-mid) 100%);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* ===== Falling Stars ===== */
        .stars-box {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .star {
            position: absolute;
            color: var(--gold);
            opacity: 0.6;
            animation: fall linear infinite;
            text-shadow: 0 0 10px var(--gold-solid);
        }
        @keyframes fall {
            0%   { transform: translateY(-30px) rotate(0deg) scale(.7); opacity: .8; }
            100% { transform: translateY(110vh) rotate(600deg) scale(1.1); opacity: .1; }
        }

        /* ===== Float Notes (subtle decoration) ===== */
        .float-note {
            position: fixed;
            font-size: 20px;
            opacity: .18;
            pointer-events: none; z-index: 0;
            animation: floatNote 9s ease-in-out infinite;
        }
        @keyframes floatNote {
            0%, 100% { transform: translate(0,0) rotate(0); opacity: .15; }
            50%      { transform: translate(25px, -35px) rotate(12deg); opacity: .4; }
        }

        /* ===== BGM Toggle Button ===== */
        .bgm-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--white-glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--pink-mid);
            box-shadow: 0 4px 0 #dbb0dd, 0 6px 16px rgba(200,130,200,.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: .25s;
            color: var(--purple);
        }
        .bgm-toggle:hover {
            transform: translateY(-2px) scale(1.08);
            border-color: var(--pink-deep);
        }
        .bgm-toggle.playing {
            background: linear-gradient(135deg, var(--pink-mid), var(--lavender));
            animation: spinNote 3s linear infinite;
        }
        .bgm-toggle.paused {
            background: var(--white-glass);
            animation: none;
        }
        .bgm-toggle .tooltip {
            position: absolute;
            bottom: 54px;
            right: 0;
            background: rgba(107,63,122,.85);
            color: #fff;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: .2s;
        }
        .bgm-toggle:hover .tooltip {
            opacity: 1;
        }

        /* ===== Main Card ===== */
        .castle {
            max-width: 520px; width: 100%;
            background: var(--white-glass);
            backdrop-filter: blur(14px);
            border-radius: 56px 56px 36px 36px;
            padding: 28px 24px 36px;
            box-shadow: 0 18px 55px rgba(180,100,200,.22),
                        0 0 0 1.5px rgba(255,220,245,.5) inset,
                        0 0 28px rgba(255,200,240,.28);
            border: 2px solid rgba(255,220,245,.55);
            position: relative; z-index: 1;
        }

        /* ===== Crown Badge ===== */
        .crown-badge {
            text-align: center; font-size: 40px;
            margin-top: -52px; margin-bottom: 8px;
            filter: drop-shadow(0 5px 10px rgba(255,180,200,.45));
            animation: floatY 3s ease-in-out infinite;
        }
        @keyframes floatY {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(-5px); }
        }

        /* ===== Welcome Banner ===== */
        .welcome {
            text-align: center;
            font-size: 20px; font-weight: 700; color: var(--purple);
            background: linear-gradient(135deg, #f9d6ff, var(--pink-mid));
            padding: 14px 18px; border-radius: 100px;
            box-shadow: 0 4px 0 #d9a8e0, 0 7px 18px rgba(200,130,210,.18);
            border: 2px solid #ffffffaa;
            margin-bottom: 22px; line-height: 1.55; letter-spacing: .5px;
        }

        /* ===== Photo Frame ===== */
        .photo-frame {
            text-align: center; margin: 8px 0 18px; position: relative;
        }
        .photo-frame .glow {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(255,200,240,.45) 0%, transparent 70%);
            border-radius: 50%; filter: blur(18px); z-index: 0;
            animation: pulseGlow 2.6s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%,100% { opacity: .45; transform: translate(-50%,-50%) scale(1); }
            50%     { opacity: .9;  transform: translate(-50%,-50%) scale(1.08); }
        }
        .photo-frame img {
            width: 160px; height: 160px;
            border-radius: 50%; object-fit: cover;
            border: 5px solid #ffe8f5;
            box-shadow: 0 0 0 3.5px #f8c8e0, 0 10px 30px rgba(190,110,200,.28);
            position: relative; z-index: 1;
            background: #ffeef8;
        }
        .photo-frame .crown-icon {
            position: absolute; top: -8px; right: calc(50% - 90px);
            font-size: 32px; z-index: 2;
            filter: drop-shadow(0 3px 5px rgba(255,180,100,.55));
            animation: floatY 2.2s ease-in-out infinite;
        }

        /* ===== Name Wall ===== */
        .name-wall {
            text-align: center; margin-bottom: 16px;
        }
        .name-wall .real-name {
            font-size: 26px; font-weight: 700; color: var(--purple);
            letter-spacing: 3px;
        }
        .name-wall .nicknames {
            display: flex; justify-content: center; gap: 8px;
            margin-top: 6px; flex-wrap: wrap;
        }
        .name-wall .nicknames span {
            background: var(--pink-mid);
            padding: 3px 14px; border-radius: 30px;
            font-size: 13px; color: var(--purple);
            border: 1px solid var(--pink-deep);
        }

        /* ===== Time Capsule ===== */
        .time-capsule {
            text-align: center; margin: 12px 0 18px;
            background: rgba(255,235,248,.65);
            border-radius: 100px; padding: 10px 18px;
            border: 1.5px solid #ffdcee;
            box-shadow: 0 2px 0 #dbb0dd;
        }
        .time-capsule .label {
            font-size: 14px; color: var(--purple-light);
        }
        .time-capsule .counter {
            font-size: 28px; font-weight: 700; color: var(--gold-solid);
            text-shadow: 0 2px 8px rgba(255,217,102,.4);
            letter-spacing: 2px;
        }
        .time-capsule .unit {
            font-size: 14px; color: var(--purple);
        }

        /* ===== Section Title ===== */
        .section-title {
            font-size: 18px; font-weight: 700; color: var(--purple);
            margin: 22px 0 12px 4px;
            display: flex; align-items: center; gap: 8px;
            border-bottom: 2.5px dashed var(--lavender);
            padding-bottom: 7px;
        }
        .section-title span {
            background: var(--pink-mid);
            padding: 2px 12px; border-radius: 28px;
            font-size: 16px;
        }

        /* ===== Eggroll Card ===== */
        .eggroll-card {
            background: linear-gradient(135deg, #fff5f9, #fce8f5);
            border-radius: 28px; padding: 14px 16px;
            display: flex; align-items: center; gap: 14px;
            border: 2px solid var(--pink-mid);
            box-shadow: 0 3px 0 #dbb0dd, 0 5px 14px rgba(200,130,200,.1);
            margin: 6px 0;
        }
        .eggroll-card .avatar-link {
            display: inline-block;
            transition: .2s;
        }
        .eggroll-card .avatar-link:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 4px 8px rgba(200,130,180,.3));
        }
        .eggroll-card .avatar {
            width: 68px; height: 68px;
            border-radius: 50%; object-fit: cover;
            border: 3.5px solid #ffd0e6;
            background: #fff0f8;
            box-shadow: 0 3px 8px rgba(200,130,180,.18);
        }
        .eggroll-card .info { flex: 1; }
        .eggroll-card .info .name {
            font-size: 19px; font-weight: 700; color: var(--purple);
        }
        .eggroll-card .info .desc {
            font-size: 14px; color: var(--purple-light); margin-top: 2px;
        }
        .eggroll-card .info .tags {
            margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap;
        }
        .eggroll-card .info .tags span {
            background: var(--pink-mid);
            padding: 2px 12px; border-radius: 30px;
            font-size: 11px; color: var(--purple);
            border: 1px solid var(--pink-deep);
        }
        .eggroll-card .mood-bubble {
            margin-top: 8px;
            background: rgba(255,220,240,.5);
            border-radius: 20px; padding: 8px 14px;
            font-size: 13px; color: var(--purple-light);
            border: 1px dashed var(--pink-deep);
        }

        /* ===== Hobby Grid ===== */
        .hobby-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin: 6px 0;
        }
        .hobby-item {
            display: block;
            background: rgba(255,240,248,.65);
            backdrop-filter: blur(4px);
            border-radius: 24px; padding: 12px 4px;
            text-align: center;
            border: 1.5px solid #ffffffd0;
            box-shadow: 0 2.5px 0 #dbb0dd, 0 3px 10px rgba(200,130,200,.08);
            transition: .2s;
            font-size: 13px; font-weight: 600; color: var(--purple);
            cursor: pointer;
            text-decoration: none;
        }
        .hobby-item:hover {
            transform: translateY(-3px) scale(1.03);
            background: rgba(255,235,248,.88);
            border-color: var(--pink-deep);
        }
        .hobby-item .icon { display: block; font-size: 30px; margin-bottom: 2px; }
        .hobby-item .link-hint {
            display: block;
            font-size: 10px;
            color: var(--purple-light);
            margin-top: 2px;
            opacity: .6;
        }

        /* ===== Music Player ===== */
        .music-player {
            background: rgba(255,235,248,.65);
            border-radius: 36px; padding: 12px 16px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 3px 0 #d9b0dd, 0 5px 14px rgba(200,130,200,.12);
            border: 1.5px solid #ffffffd0;
            margin-bottom: 4px; flex-wrap: wrap;
        }
        .music-player .note-icon {
            font-size: 26px;
            animation: spinNote 4s linear infinite;
        }
        @keyframes spinNote {
            0%   { transform: rotate(0) scale(1); }
            50%  { transform: rotate(8deg) scale(1.08); }
            100% { transform: rotate(0) scale(1); }
        }
        .music-player audio {
            flex: 1; min-width: 130px; height: 36px;
            border-radius: 36px; outline: none;
        }
        .music-player .label {
            font-size: 13px; color: var(--purple);
            background: var(--pink-mid);
            padding: 3px 12px; border-radius: 28px;
            font-weight: 600; white-space: nowrap;
        }

        /* ===== Poster Showcase ===== */
        .poster-section {
            text-align: center; margin: 10px 0;
        }
        .poster-section img {
            max-width: 100%; border-radius: 20px;
            box-shadow: 0 6px 0 #dbb0dd, 0 10px 25px rgba(200,130,200,.18);
            border: 2.5px solid var(--pink-mid);
        }

        /* ===== Status Bar ===== */
        .status-bar {
            text-align: center; margin: 16px 0 8px;
            background: rgba(255,235,248,.55);
            border-radius: 100px; padding: 8px 16px;
            font-size: 14px; color: var(--purple-light);
            border: 1.5px solid var(--pink-mid);
        }
        .status-bar .tag {
            background: var(--pink-mid);
            padding: 2px 10px; border-radius: 28px;
            font-size: 12px; color: var(--purple);
            margin: 0 3px; display: inline-block;
        }

        /* ===== Footer ===== */
        .footer-note {
            text-align: center; margin-top: 24px;
            font-size: 14px; color: var(--purple-light);
            background: rgba(255,240,248,.45);
            padding: 10px; border-radius: 60px;
            border: 1px solid var(--pink-mid);
            letter-spacing: .4px;
        }
        .footer-note .heart {
            color: #f28bb0;
            animation: heartbeat 1.2s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes heartbeat {
            0%,100% { transform: scale(1); }
            50%     { transform: scale(1.18); }
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            .castle { padding: 18px 14px 28px; border-radius: 36px; }
            .welcome { font-size: 17px; padding: 10px 12px; }
            .photo-frame img { width: 120px; height: 120px; }
            .photo-frame .glow { width: 140px; height: 140px; }
            .hobby-grid { grid-template-columns: repeat(2, 1fr); }
            .music-player { flex-direction: column; align-items: stretch; }
            .name-wall .real-name { font-size: 22px; }
            .time-capsule .counter { font-size: 24px; }
            .bgm-toggle { bottom: 12px; right: 12px; width: 40px; height: 40px; font-size: 18px; }
        }
    </style>
</head>
<body>

<!-- Hidden BGM Audio (looping background music) -->
<!-- ============================================
  BGM 替换说明：
  把下面的 src="" 改成你的舒缓BGM文件路径或URL。
  推荐3个免费来源（需要下载后放到 images/ 同级目录）：
  1. Pixabay 音乐库（搜索"lullaby"或"calm"）：https://pixabay.com/music/
  2. Mixkit（搜索"calm"或"children"）：https://mixkit.co/free-stock-music/mood/calm/
  3. Bensound（搜索"ukulele"或"little idea"）：https://www.bensound.com/
  下载后把文件命名为 bgm.mp3 放到本项目根目录，src 改成 "bgm.mp3" 即可。
  ============================================ -->
<audio id="bgmAudio" loop preload="auto">
    <source src="" type="audio/mpeg" />
</audio>

<!-- BGM Floating Toggle Button -->
<div class="bgm-toggle paused" id="bgmToggle" onclick="toggleBGM()">
    <span id="bgmIcon">&#x1F3B5;</span>
    <span class="tooltip" id="bgmTooltip">点击播放城堡BGM</span>
</div>

<!-- Falling Stars -->
<div class="stars-box" id="starsBox"></div>

<!-- Float Notes -->
<div class="float-note" style="top:6%;left:3%;">&#x1F3B5;</div>
<div class="float-note" style="bottom:12%;right:3%;animation-delay:3.5s;">&#x1F3C6;</div>
<div class="float-note" style="top:45%;left:1.5%;animation-delay:5.5s;font-size:26px;">&#x2728;</div>

<!-- ===== Main Card ===== -->
<div class="castle">

    <!-- Crown -->
    <div class="crown-badge">&#x1F451;</div>

    <!-- Welcome -->
    <div class="welcome">
        &#x2728; 这里住着一个爱笑、也爱唱歌的 <strong>AI 果果</strong> &#x2728;
    </div>

    <!-- Hero Photo -->
    <div class="photo-frame">
        <div class="glow"></div>
        <img src="images/avatar-main-v2.png" alt="AI果果" />
        <div class="crown-icon">&#x1F451;</div>
    </div>

    <!-- Name Wall -->
    <div class="name-wall">
        <div class="real-name">果果 Guoguo</div>
        <div class="nicknames">
            <span>蛋卷守护者</span>
            <span>客厅小太阳</span>
            <span>AI 小公主</span>
        </div>
    </div>

    <!-- Time Capsule -->
    <div class="time-capsule">
        <div class="label">果果来到这个世界已经</div>
        <span class="counter" id="dayCounter">---</span>
        <span class="unit">天啦</span>
    </div>

    <!-- ===== Danjuan Section ===== -->
    <div class="section-title">
        <span>&#x1F43E; 蛋卷小可爱</span>
    </div>
    <div class="eggroll-card">
        <!-- 点击蛋卷照片跳转到蛋卷视频 -->
        <!-- TODO: 把 href="#" 替换成蛋卷视频的实际链接（比如抖音视频链接或本地视频路径） -->
        <a class="avatar-link" href="#" target="_blank" title="点击看蛋卷的视频">
            <img class="avatar" src="images/danjuan-avatar.png" alt="蛋卷（点击看视频）" />
        </a>
        <div class="info">
            <div class="name">蛋卷 &#x1F451;</div>
            <div class="desc">&#x1F43E; 果果最好的毛茸茸朋友</div>
            <div class="tags">
                <span>&#x1F634; 爱睡觉</span>
                <span>&#x1F35A; 爱吃瓜子</span>
                <span>&#x1F3BE; 爱跑轮子</span>
            </div>
        </div>
    </div>
    <div class="eggroll-card" style="margin-top: 6px;">
        <div class="mood-bubble">
            &#x1F4AC; 本仓鼠今天只想睡觉 ... 明天也不想动
        </div>
    </div>

    <!-- ===== Hobby Section ===== -->
    <div class="section-title">
        <span>&#x1F308; 果果喜欢做的事</span>
    </div>
    <div class="hobby-grid">
        <!-- TODO: 把 href="#" 替换成对应的素材链接（画画作品/街舞视频/唱歌视频） -->
        <a class="hobby-item" href="#" target="_blank" title="看果果的画作">
            <span class="icon">&#x1F3A8;</span>画画
            <span class="link-hint">点击看看</span>
        </a>
        <a class="hobby-item" href="#" target="_blank" title="看果果跳街舞">
            <span class="icon">&#x1F483;</span>街舞
            <span class="link-hint">点击看看</span>
        </a>
        <a class="hobby-item" href="#" target="_blank" title="听果果唱歌">
            <span class="icon">&#x1F3A4;</span>唱歌
            <span class="link-hint">点击看看</span>
        </a>
        <a class="hobby-item" href="#hobby-ai" title="果果的AI探索">
            <span class="icon">&#x2728;</span>AI
        </a>
    </div>

    <!-- ===== Music Section ===== -->
    <div class="section-title">
        <span>&#x1F3A4; 果果的音乐盒</span>
    </div>
    <div class="music-player">
        <span class="note-icon">&#x1F3B5;</span>
        <span class="label">&#x2728; AI唱的歌</span>
        <!-- TODO: 替换为果果的AI歌曲文件链接 -->
        <audio controls>
            <source src="" type="audio/mpeg" />
            你的浏览器不支持音频播放。
        </audio>
    </div>

    <!-- ===== Poster ===== -->
    <div class="section-title">
        <span>&#x1F5BC; 果果的海报</span>
    </div>
    <div class="poster-section">
        <img src="images/poster-v2.png" alt="果果海报" />
    </div>

    <!-- ===== Status Bar ===== -->
    <div class="status-bar">
        果果今天：
        <span class="tag">&#x2728; 开心到飞起</span>
        <span class="tag">&#x1F43E; 蛋卷在睡觉</span>
        <span class="tag">&#x1F3B5; 练了一小时琴</span>
    </div>

    <!-- ===== Footer ===== -->
    <div class="footer-note">
        <span class="heart">&#x1F496;</span>
        欢迎常来果果的小城堡玩
        <span class="heart">&#x1F496;</span>
    </div>

</div>

<script>
/* ===== BGM Toggle ===== */
var bgmPlaying = false;
var bgmAudio = document.getElementById('bgmAudio');
var bgmToggle = document.getElementById('bgmToggle');
var bgmIcon = document.getElementById('bgmIcon');
var bgmTooltip = document.getElementById('bgmTooltip');

function toggleBGM() {
    if (!bgmAudio.src || bgmAudio.src === window.location.href) {
        bgmTooltip.textContent = '还没加载BGM，请先添加音乐文件';
        setTimeout(function() { bgmTooltip.textContent = '点击播放城堡BGM'; }, 2500);
        return;
    }
    if (bgmPlaying) {
        bgmAudio.pause();
        bgmPlaying = false;
        bgmToggle.className = 'bgm-toggle paused';
        bgmTooltip.textContent = '点击播放城堡BGM';
    } else {
        bgmAudio.volume = 0.35;
        bgmAudio.play().catch(function() {
            bgmTooltip.textContent = '浏览器阻止了自动播放，请再试一次';
            setTimeout(function() { bgmTooltip.textContent = '点击播放城堡BGM'; }, 2500);
        });
        bgmPlaying = true;
        bgmToggle.className = 'bgm-toggle playing';
        bgmTooltip.textContent = '点击暂停BGM';
    }
}

/* ===== Falling Stars ===== */
(function() {
    var box = document.getElementById('starsBox');
    var items = ['\u2728', '\u2B50', '\uD83C\uDF1F', '\uD83D\uDCAB', '\uD83C\uDFB5', '\uD83C\uDF38'];
    for (var i = 0; i < 18; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        s.textContent = items[i % items.length];
        s.style.left  = (Math.random() * 94 + 3) + '%';
        s.style.fontSize = (10 + Math.random() * 14) + 'px';
        s.style.animationDuration = (12 + Math.random() * 16) + 's';
        s.style.animationDelay    = (Math.random() * 18) + 's';
        box.appendChild(s);
    }
})();

/* ===== Time Capsule ===== */
(function() {
    var BIRTHDAY = '2020-05-31';
    var now  = new Date();
    var birth = new Date(BIRTHDAY);
    var days = Math.floor((now - birth) / (1000 * 60 * 60 * 24));
    document.getElementById('dayCounter').textContent = days;
})();
</script>

</body>
</html>
